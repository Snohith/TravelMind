name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Next.js Build & Lint
      run: npm run build
      env:
        # Provide dummy env vars for the static build checking process if needed
        NEXT_PUBLIC_SUPABASE_URL: "https://ktuasbjxuqpztjrleblo.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_zfF14xywwu_VWknLsPhsxQ_Pi4FTU3w"
